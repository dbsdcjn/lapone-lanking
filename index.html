<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAPONE 好き顔診断</title>

  <meta property="og:title" content="あなたの好き顔9選 | LAPONE好き顔診断">
  <meta property="og:description" content="好きな顔を選ぶだけで、あなただけのランキングが完成">
  <meta property="og:image" content="https://dbsdcjn.github.io/lapone-lanking/image/ogp-image.png">
  <meta property="og:url" content="https://dbsdcjn.github.io/lapone-lanking/">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="あなたの好き顔9選 | LAPONE好き顔診断">
  <meta name="twitter:description" content="好きな顔を選ぶだけで、あなただけのランキングが完成">
  <meta name="twitter:image" content="https://dbsdcjn.github.io/lapone-lanking/image/ogp-image.png">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    :root {
      --orange: #FF9700;
      --orange-light: #fff3e0;
      --orange-pale: #fff8f0;
      --text-primary: #1a1a1a;
      --text-secondary: #666;
      --text-muted: #999;
      --surface-0: #ffffff;
      --surface-1: #f0f0f0;
      --surface-2: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.18);
      --radius: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary: #f0f0f0;
        --text-secondary: #aaa;
        --text-muted: #666;
        --surface-0: #111;
        --surface-1: #1e1e1e;
        --surface-2: #252525;
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.18);
        --orange-pale: #2a1f0a;
      }
    }

    body {
      font-family: "Zen Maru Gothic", -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: var(--surface-0);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .app {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    /* Header */
    .header { text-align: center; margin-bottom: 2rem; }
    .header-badge {
      display: inline-block;
      background: var(--orange);
      color: white;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 0.75rem;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      margin-bottom: 0.3rem;
    }
    .header p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

    /* Group filter */
    .group-filter {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border-radius: 999px;
      border: 1px solid var(--border-strong);
      background: var(--surface-2);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn::before {
      content: "";
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border-strong);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--orange); }
    .filter-btn.active {
      border-color: var(--orange);
      background: var(--orange-pale);
      color: var(--orange);
    }
    .filter-btn.active::before {
      content: "✓";
      background: var(--orange);
      border-color: var(--orange);
    }

    .select-screen.hidden { display: none; }

    .how-to {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 1.75rem;
    }
    .how-to-step {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
    }
    .how-to-num {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--orange);
      color: #fff;
      font-weight: 800;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .how-to-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .how-to-desc { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    .select-hint {
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .mode-select {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .mode-btn {
      flex: 1;
      text-align: center;
      padding: 10px 8px;
      border-radius: 12px;
      border: 1px solid var(--border-strong);
      background: var(--surface-2);
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn:hover { border-color: var(--orange); }
    .mode-btn.active {
      border-color: var(--orange);
      background: var(--orange-pale);
    }
    .mode-btn-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .mode-btn.active .mode-btn-title { color: var(--orange); }
    .mode-btn-desc { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .select-meta {
      text-align: center;
      font-size: 12px;
      color: var(--orange);
      font-weight: 600;
      margin-bottom: 1rem;
      min-height: 16px;
    }
    .start-btn {
      display: block;
      width: 100%;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
      padding: 13px;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .start-btn:hover { opacity: 0.88; }
    .start-btn:disabled {
      background: var(--surface-1);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    /* Progress */
    .progress-bar-wrap {
      background: var(--surface-1);
      border-radius: 999px;
      height: 6px;
      margin-bottom: 0.5rem;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--orange);
      border-radius: 999px;
      transition: width 0.4s ease;
    }
    .progress-label {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .stage-label {
      text-align: center;
      font-size: 13px;
      color: var(--orange);
      font-weight: 600;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }

    /* Battle */
    .vs-section {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .idol-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s, opacity 0.25s, filter 0.25s;
      user-select: none;
    }
    .idol-card:hover {
      transform: translateY(-3px);
      border-color: var(--orange);
      box-shadow: 0 6px 20px rgba(255,151,0,0.18);
    }
    .idol-card:active { transform: scale(0.97); }
    .idol-card.chosen {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px var(--orange), 0 10px 26px rgba(255,151,0,0.4);
      animation: chosen-flash 0.4s ease;
    }
    .idol-card.unchosen { opacity: 0.3; filter: grayscale(60%); transform: scale(0.97); }

    @keyframes chosen-flash {
      0% { transform: scale(1); }
      35% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    .idol-avatar {
      width: 100%;
      aspect-ratio: 3 / 4;
      margin: 0;
      background: var(--surface-1);
      position: relative;
      overflow: hidden;
    }
    .idol-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }
    .idol-caption {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 18px 10px 8px;
      background: linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0));
      text-align: left;
    }
    .idol-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      margin-bottom: 1px;
    }
    .idol-group-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: rgba(255,255,255,0.85);
    }

    .choose-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
    }
    .choose-arrow-btn {
      padding: 14px 8px;
      background: var(--surface-2);
      color: var(--orange);
      border: 2px solid var(--orange);
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, background 0.15s;
    }
    .choose-arrow-btn:hover { background: var(--orange-pale); }
    .choose-arrow-btn:active { transform: scale(0.97); }

    .both-like-btn {
      display: block;
      width: 100%;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
      padding: 13px;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 0.5rem;
      transition: opacity 0.15s;
      box-shadow: 0 4px 14px rgba(255,151,0,0.3);
    }
    .both-like-btn:hover { opacity: 0.88; }

    .skip-btn {
      display: block;
      width: 100%;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
      padding: 11px;
      margin-bottom: 0.5rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      border-radius: 999px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.15s;
    }
    .skip-btn:hover { color: var(--orange); }

    .undo-btn {
      display: block;
      width: 100%;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--text-secondary);
      border-radius: 999px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .undo-btn:hover { border-color: var(--orange); color: var(--orange); }
    .undo-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .vs-badge {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--orange);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(255,151,0,0.4);
      border: 3px solid var(--surface-0);
    }

    /* Heart burst animation */
    .heart-burst {
      position: fixed;
      pointer-events: none;
      font-size: 24px;
      color: var(--orange);
      animation: burst 0.7s ease forwards;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }
    @keyframes burst {
      0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%, -120%) scale(1.4); opacity: 0; }
    }

    /* Result */
    .result-screen { display: none; }
    .result-screen.active { display: block; }
    .battle-screen.hidden { display: none; }

    .header.hidden { display: none; }

    .result-header { text-align: center; margin-bottom: 1.5rem; }
    .result-badge {
      display: inline-block;
      background: var(--orange);
      color: white;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 8px 24px;
      border-radius: 999px;
      margin-bottom: 0.9rem;
      box-shadow: 0 4px 16px rgba(255,151,0,0.35);
    }
    .result-title { font-size: 22px; font-weight: 700; color: var(--orange); letter-spacing: 0.02em; margin-bottom: 0.4rem; }
    .result-subtitle { text-align: center; font-size: 14px; color: var(--text-secondary); margin-bottom: 0.5rem; }

    .tie-emoji {
      text-align: center;
      font-size: 48px;
      margin: 2.5rem 0;
      animation: tie-wobble 1.4s ease-in-out infinite;
    }
    @keyframes tie-wobble {
      0%, 100% { transform: scale(1) rotate(0deg); }
      25% { transform: scale(1.08) rotate(-4deg); }
      75% { transform: scale(1.08) rotate(4deg); }
    }

    /* Result frame: 正方形の9マスで写真を大きく見せる */
    .result-frame {
      width: 100%;
      max-width: 480px;
      margin: 0 auto 0.75rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 14px 12px;
    }
    .result-frame-header { text-align: center; margin-bottom: 10px; }
    .result-frame-badge {
      font-size: 10px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.08em;
    }
    .result-frame-title { font-size: 17px; font-weight: 800; color: var(--text-primary); }

    .nine-grid {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
    }
    .nine-cell {
      position: relative;
      min-height: 0;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface-1);
    }
    .nine-cell.rank-1 {
      grid-column: 2;
      grid-row: 2;
      border: 2px solid var(--orange);
      box-shadow: 0 4px 16px rgba(255,151,0,0.4);
      z-index: 1;
    }
    .nine-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }
    .nine-emoji { width: 100%; height: 100%; }
    .nine-emoji img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }
    .nine-rank-badge {
      position: absolute;
      top: 5px;
      left: 5px;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      background: rgba(0,0,0,0.55);
      padding: 2px 6px;
      border-radius: 999px;
    }
    .nine-caption {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 12px 8px 6px;
      background: linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0));
    }
    .nine-name { font-size: 12px; font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.5); line-height: 1.2; }
    .nine-group { font-size: 10px; color: rgba(255,255,255,0.85); }
    .nine-profile-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      color: var(--orange);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      transition: background 0.15s, color 0.15s;
    }
    .nine-profile-btn:hover { background: var(--orange); color: #fff; }

    .more-btn {
      display: block;
      width: 100%;
      max-width: 360px;
      margin: 0 auto 0.75rem;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--text-secondary);
      border-radius: 999px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .more-btn:hover { border-color: var(--orange); color: var(--orange); }
    .more-btn.hidden { display: none; }

    .more-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .more-list.hidden { display: none; }
    .more-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 10px;
    }
    .more-thumb {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface-1);
    }
    .more-thumb img { width: 100%; height: 100%; object-fit: cover; object-position: center 20%; }
    .more-info { flex: 1; min-width: 0; }
    .more-rank { font-size: 10px; font-weight: 700; color: var(--orange); }
    .more-name { font-size: 13px; font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .more-group { font-size: 10px; color: var(--text-muted); }
    .more-profile-btn {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--orange-pale);
      color: var(--orange);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      transition: background 0.15s, color 0.15s;
    }
    .more-profile-btn:hover { background: var(--orange); color: #fff; }

    .action-btns { display: flex; flex-direction: column; gap: 0.6rem; }
    .restart-btn {
      display: block; width: 100%; max-width: 360px; margin-left: auto; margin-right: auto; padding: 13px;
      background: var(--orange); color: white; border: none;
      border-radius: 999px; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: opacity 0.15s;
    }
    .restart-btn:hover { opacity: 0.88; }
    .share-btn {
      display: block; width: 100%; max-width: 360px; margin-left: auto; margin-right: auto; padding: 12px;
      background: transparent; color: var(--orange);
      border: 1px solid var(--orange); border-radius: 999px;
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .share-btn:hover { background: var(--orange); color: white; }

    @media (max-width: 480px) {
      .app { padding: 1.5rem 0.7rem 3rem; }
      .header h1 { font-size: 24px; }

      .vs-section { gap: 0.5rem; }
      .idol-name { font-size: 14px; }
      .vs-badge { width: 42px; height: 42px; font-size: 12px; }

      .choose-row { gap: 0.5rem; }
      .choose-arrow-btn { padding: 12px 6px; font-size: 13px; }
      .both-like-btn, .skip-btn { padding: 11px; font-size: 12px; }
      .filter-btn { padding: 8px 14px; font-size: 13px; }
      .start-btn, .restart-btn { padding: 15px; }

      .result-frame { padding: 10px 10px 8px; }
      .nine-grid { gap: 4px; }
    }

    @media (max-width: 360px) {
      .vs-section {
        grid-template-columns: 1fr;
      }
      .vs-badge { justify-self: center; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header" id="pageHeader">
    <div class="header-badge">LAPONE × 好き顔診断</div>
    <h1>あなたの好き顔9選</h1>
    <p>直感で選ぶだけ！<br>最後にあなただけのランキングが完成</p>
  </div>

  <div class="select-screen" id="selectScreen">
    <div class="how-to">
      <div class="how-to-step">
        <span class="how-to-num">1</span>
        <div>
          <div class="how-to-title">グループを選ぶ</div>
          <div class="how-to-desc">気になるグループを2つ以上チェック</div>
        </div>
      </div>
      <div class="how-to-step">
        <span class="how-to-num">2</span>
        <div>
          <div class="how-to-title">直感で選ぶ</div>
          <div class="how-to-desc">2人のうち好きな方をタップするだけ</div>
        </div>
      </div>
      <div class="how-to-step">
        <span class="how-to-num">3</span>
        <div>
          <div class="how-to-title">結果が完成</div>
          <div class="how-to-desc">あなただけの好き顔ランキングが誕生</div>
        </div>
      </div>
    </div>

    <p class="select-hint">✓ 2グループ以上選ぶと診断できます</p>
    <div class="group-filter" id="groupFilter">

  { name:"杉山竜司",     nameEn:"RYUJI",     group:"KO1KEYZ", photo:"image/KO1KEYZ RYUJI_02.jpg",     profile:"https://shinsekai.produce101.jp/feature/ryuji" },
  { name:"照井康祐",     nameEn:"KOSUKE",    group:"KO1KEYZ", photo:"image/KO1KEYZ KOSUKE_02.jpg",    profile:"https://shinsekai.produce101.jp/feature/kosuke" },
  { name:"濱田永遠",     nameEn:"TOWA",      group:"KO1KEYZ", photo:"image/KO1KEYZ TOWA_02.jpg",      profile:"https://shinsekai.produce101.jp/feature/towa" },
];

let idols = [];
let wins = {};
let appearances = {};
let comparisons = [];
let currentIdx = 0;
let totalComparisons = 0;
let selectedGroups = new Set();
let compareMode = "quick";
let history = [];
let pendingAdvanceTimer = null;
let lastRanked = [];
let lastMoreRanked = [];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildComparisons(list, mode) {
  const pairs = [];
  for (let i = 0; i < list.length; i++) {
    for (let j = i + 1; j < list.length; j++) {
      pairs.push([i, j]);
    }
  }
  shuffle(pairs);
  if (mode === "full") return pairs;
  const needed = Math.min(pairs.length, Math.ceil(list.length * 2.5));
  return pairs.slice(0, needed);
}

function rate(i) {
  const a = appearances[i] || 0;
  return a === 0 ? 0 : (wins[i] || 0) / a;
}

// 勝率優先、同率なら勝ち数、それも同じなら対戦数が多い方を上位にする
function compareIdols(a, b) {
  const byRate = rate(b) - rate(a);
  if (byRate !== 0) return byRate;
  const byWins = wins[b] - wins[a];
  if (byWins !== 0) return byWins;
  return appearances[b] - appearances[a];
}

function initGame() {
  idols = ALL_IDOLS.filter(x => selectedGroups.has(x.group));

  wins = {};
  appearances = {};
  idols.forEach((_, i) => { wins[i] = 0; appearances[i] = 0; });
  comparisons = buildComparisons(idols, compareMode);
  currentIdx = 0;
  totalComparisons = comparisons.length;
  history = [];
  updateUndoButtons();

  document.getElementById("resultScreen").classList.remove("active");
  document.getElementById("battleScreen").classList.remove("hidden");
  showNext();
}

function showNext() {
  if (currentIdx >= comparisons.length) {
    tryConclude();
    return;
  }
  const [a, b] = comparisons[currentIdx];
  const idolA = idols[a], idolB = idols[b];

  setCard("A", idolA);
  setCard("B", idolB);

  document.getElementById("cardA").className = "idol-card";
  document.getElementById("cardB").className = "idol-card";

  const pct = Math.round((currentIdx / totalComparisons) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = `対決 ${currentIdx + 1} / ${totalComparisons}`;

  const stages = ["対決スタート", "熱戦中！", "佳境に入ってきた！", "もうすぐ結果！"];
  document.getElementById("stageLabel").textContent = stages[Math.min(Math.floor(pct / 25), 3)];
}

function setCard(side, idol) {
  document.getElementById("photo" + side).src = idol.photo;
  document.getElementById("groupTag" + side).textContent = idol.group;
  document.getElementById("name" + side).textContent = idol.name;
}

function choose(side, event) {
  const [a, b] = comparisons[currentIdx];
  const winner = side === 0 ? a : b;
  const loser = side === 0 ? b : a;
  wins[winner]++;
  appearances[winner]++;
  appearances[loser]++;
  history.push({ idx: currentIdx, winner, loser });
  currentIdx++;
  updateUndoButtons();

  document.getElementById(side === 0 ? "cardA" : "cardB").className = "idol-card chosen";
  document.getElementById(side === 0 ? "cardB" : "cardA").className = "idol-card unchosen";

  spawnHeart(event);
  pendingAdvanceTimer = setTimeout(() => { pendingAdvanceTimer = null; advance(); }, 380);
}

function skip() {
  history.push({ idx: currentIdx, winner: null });
  currentIdx++;
  updateUndoButtons();
  advance();
}

function advance() {
  if (compareMode !== "full" && currentIdx < comparisons.length && isTop9Locked()) {
    showResult();
    return;
  }
  showNext();
}

// 通常の対決リストを使い切った時点で9位の境界が同点の場合、安易に確定させず追加対決を挟む
function tryConclude() {
  const totalAppearances = idols.reduce((sum, _, i) => sum + (appearances[i] || 0), 0);
  if (totalAppearances === 0) {
    showTieResult();
    return;
  }

  const ambiguous = findAmbiguousTie();
  if (ambiguous) {
    if (ambiguous.unaskedPairs.length > 0) {
      comparisons = comparisons.concat(ambiguous.unaskedPairs);
      totalComparisons = comparisons.length;
      showNext();
      return;
    }
    // 同点メンバー同士の対決をやり尽くしてもなお決着がつかない場合は、
    // 決着がついたところまでを結果として出す（1人も決まっていなければ特別演出）
    if (ambiguous.countAbove === 0) {
      showTieResult();
      return;
    }
    const ranked = idols.map((_, i) => i).sort(compareIdols);
    const decidedIdx = ranked.slice(0, ambiguous.countAbove);
    showResult(decidedIdx);
    return;
  }

  showResult();
}

// 9位とその次点が同率で、9位までの顔ぶれを一意に決められないかどうかを調べる
function findAmbiguousTie() {
  const ranked = idols.map((_, i) => i).sort(compareIdols);
  const boundaryRate = rate(ranked[8]);
  const countAbove = ranked.filter(i => rate(i) > boundaryRate).length;
  const tied = ranked.filter(i => rate(i) === boundaryRate);
  const slotsNeeded = 9 - countAbove;

  if (tied.length <= slotsNeeded) return null;

  const askedKeys = new Set(comparisons.map(([a, b]) => a < b ? `${a}-${b}` : `${b}-${a}`));
  const unaskedPairs = [];
  for (let x = 0; x < tied.length; x++) {
    for (let y = x + 1; y < tied.length; y++) {
      const a = tied[x], b = tied[y];
      const key = a < b ? `${a}-${b}` : `${b}-${a}`;
      if (!askedKeys.has(key)) unaskedPairs.push([a, b]);
    }
  }
  shuffle(unaskedPairs);
  return { tied, unaskedPairs, countAbove };
}

function undo() {
  if (history.length === 0) return;
  if (pendingAdvanceTimer) {
    clearTimeout(pendingAdvanceTimer);
    pendingAdvanceTimer = null;
  }
  const last = history.pop();
  if (last.winner !== null) {
    wins[last.winner]--;
    appearances[last.winner]--;
    appearances[last.loser]--;
  }
  currentIdx = last.idx;
  updateUndoButtons();

  document.getElementById("pageHeader").classList.remove("hidden");
  document.getElementById("resultScreen").classList.remove("active");
  document.getElementById("tieScreen").classList.remove("active");
  document.getElementById("battleScreen").classList.remove("hidden");
  showNext();
}

function updateUndoButtons() {
  const disabled = history.length === 0;
  document.getElementById("undoBtn").disabled = disabled;
  document.getElementById("undoBtnResult").disabled = disabled;
  document.getElementById("undoBtnTie").disabled = disabled;
}

// Top9に入れない/入れる対象がもう確定し、残りの対決を見ても結果が変わらない場合に早期終了する
function isTop9Locked() {
  if (idols.length <= 9) return false;

  const remainingCount = {};
  idols.forEach((_, i) => { remainingCount[i] = 0; });
  comparisons.slice(currentIdx).forEach(([a, b]) => {
    remainingCount[a]++;
    remainingCount[b]++;
  });

  // 残り全部に勝った場合の最良勝率／全部負けた場合の最悪勝率
  const bestRate = i => {
    const a = appearances[i] + remainingCount[i];
    return a === 0 ? 0 : (wins[i] + remainingCount[i]) / a;
  };
  const worstRate = i => {
    const a = appearances[i] + remainingCount[i];
    return a === 0 ? 0 : wins[i] / a;
  };

  const ranked = idols.map((_, i) => i).sort(compareIdols);
  const top9 = ranked.slice(0, 9);
  const rest = ranked.slice(9);

  const minTop9WorstRate = Math.min(...top9.map(worstRate));
  const maxRestBestRate = Math.max(...rest.map(bestRate));

  return maxRestBestRate < minTop9WorstRate;
}

function spawnHeart(e) {
  const h = document.createElement("div");
  h.className = "heart-burst";
  h.textContent = "♡";
  const x = e && e.clientX ? e.clientX : window.innerWidth / 2;
  const y = e && e.clientY ? e.clientY : window.innerHeight / 2;
  h.style.left = x + "px";
  h.style.top  = y + "px";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 800);
}

function showResult(decidedIdx) {
  const totalAppearances = idols.reduce((sum, _, i) => sum + (appearances[i] || 0), 0);
  if (totalAppearances === 0) {
    showTieResult();
    return;
  }

  document.getElementById("pageHeader").classList.add("hidden");
  document.getElementById("battleScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.add("active");

  const idx = decidedIdx || idols.map((_, i) => i).sort(compareIdols).slice(0, 9);
  const ranked = idx.map(i => ({ ...idols[i], wins: wins[i], appearances: appearances[i] }));
  lastRanked = ranked;

  const count = ranked.length;
  document.getElementById("resultTitle").textContent = `あなたの好き顔${count}選 ✦`;
  document.getElementById("resultSubtitle").textContent = count === 9
    ? "対決を勝ち抜いたメンバーたちです"
    : `同率で決着がつかなかったため、決まった${count}名だけの結果です`;

  const grid = document.getElementById("nineGrid");
  grid.innerHTML = "";
  ranked.forEach((idol, i) => {
    const rank = i + 1;
    const cell = document.createElement("div");
    cell.className = "nine-cell" + (i === 0 ? " rank-1" : "");
    cell.innerHTML = `
      <div class="nine-emoji"><img src="${idol.photo}" alt=""></div>
      <div class="nine-rank-badge">No.${rank}</div>
      <div class="nine-caption">
        <div class="nine-name">${idol.name}</div>
        <div class="nine-group">${idol.group}</div>
      </div>
      <button class="nine-profile-btn" type="button" aria-label="プロフィールを見る">↗</button>
    `;
    cell.querySelector(".nine-profile-btn").addEventListener("click", () => {
      window.open(idol.profile, "_blank", "noopener,noreferrer");
    });
    grid.appendChild(cell);
  });

  // ガチ全部比較モードは全員が総当たりで比較されているため、9位より下も信頼できる順位として「もっと見る」で出せる
  const moreBtn = document.getElementById("moreBtn");
  const moreList = document.getElementById("moreList");
  moreList.innerHTML = "";
  moreList.classList.add("hidden");
  if (compareMode === "full" && idols.length > ranked.length) {
    const shownIds = new Set(idx);
    const restIdx = idols.map((_, i) => i).filter(i => !shownIds.has(i)).sort(compareIdols);
    lastMoreRanked = restIdx.map(i => ({ ...idols[i], wins: wins[i], appearances: appearances[i] }));
    moreBtn.textContent = `もっと見る（残り${lastMoreRanked.length}人）`;
    moreBtn.classList.remove("hidden");
  } else {
    lastMoreRanked = [];
    moreBtn.classList.add("hidden");
  }

  document.getElementById("progressFill").style.width = "100%";
  document.getElementById("progressLabel").textContent = "診断完了！";
  document.getElementById("stageLabel").textContent = "結果発表";
}

function toggleMore() {
  const moreBtn = document.getElementById("moreBtn");
  const moreList = document.getElementById("moreList");
  const isHidden = moreList.classList.contains("hidden");

  if (!isHidden) {
    moreList.classList.add("hidden");
    moreBtn.textContent = `もっと見る（残り${lastMoreRanked.length}人）`;
    return;
  }

  const offset = lastRanked.length;
  moreList.innerHTML = "";
  lastMoreRanked.forEach((idol, i) => {
    const rank = offset + i + 1;
    const item = document.createElement("div");
    item.className = "more-item";
    item.innerHTML = `
      <div class="more-thumb"><img src="${idol.photo}" alt=""></div>
      <div class="more-info">
        <div class="more-rank">No.${rank}</div>
        <div class="more-name">${idol.name}</div>
        <div class="more-group">${idol.group}</div>
      </div>
      <button class="more-profile-btn" type="button" aria-label="プロフィールを見る">↗</button>
    `;
    item.querySelector(".more-profile-btn").addEventListener("click", () => {
      window.open(idol.profile, "_blank", "noopener,noreferrer");
    });
    moreList.appendChild(item);
  });
  moreList.classList.remove("hidden");
  moreBtn.textContent = "閉じる ↑";
}

function showTieResult() {
  document.getElementById("pageHeader").classList.add("hidden");
  document.getElementById("battleScreen").classList.add("hidden");
  document.getElementById("tieScreen").classList.add("active");
  document.getElementById("progressFill").style.width = "100%";
  document.getElementById("progressLabel").textContent = "診断完了！";
  document.getElementById("stageLabel").textContent = "結果発表";
}

function restart() {
  document.getElementById("pageHeader").classList.remove("hidden");
  document.getElementById("resultScreen").classList.remove("active");
  document.getElementById("tieScreen").classList.remove("active");
  document.getElementById("battleScreen").classList.add("hidden");
  document.getElementById("selectScreen").classList.remove("hidden");
}

const SHARE_URL = "https://dbsdcjn.github.io/lapone-lanking/";

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function drawCover(ctx, img, dx, dy, dw, dh) {
  const destRatio = dw / dh;
  const srcRatio = img.width / img.height;
  let sx, sy, sw, sh;
  if (srcRatio > destRatio) {
    sh = img.height;
    sw = sh * destRatio;
    sx = (img.width - sw) / 2;
    sy = 0;
  } else {
    sw = img.width;
    sh = sw / destRatio;
    sx = 0;
    // 顔は写真の上部3分の1あたりにあることが多いため、中央ではなく上寄りをクロップする
    sy = (img.height - sh) * 0.15;
  }
  ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
}

// 正方形を3x3に分割し、中央のマスに1位を配置した画像を作る
async function buildShareImage(ranked) {
  const size = 900;
  const cell = size / 3;
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");

  const images = await Promise.all(ranked.map(idol => loadImage(idol.photo)));

  const centerCell = 4;
  const outerCells = [0, 1, 2, 3, 5, 6, 7, 8];
  const cellToImage = { [centerCell]: images[0] };
  outerCells.forEach((cellIdx, i) => { cellToImage[cellIdx] = images[i + 1]; });

  for (let cellIdx = 0; cellIdx < 9; cellIdx++) {
    const col = cellIdx % 3, row = Math.floor(cellIdx / 3);
    const x = col * cell, y = row * cell;
    drawCover(ctx, cellToImage[cellIdx], x, y, cell, cell);
    if (cellIdx === centerCell) {
      ctx.strokeStyle = "#FF9700";
      ctx.lineWidth = 8;
      ctx.strokeRect(x + 4, y + 4, cell - 8, cell - 8);
    }
  }

  return new Promise(resolve => canvas.toBlob(resolve, "image/png"));
}

async function tweetResult() {
  if (!lastRanked.length) return;
  const shareBtn = document.getElementById("shareBtn");
  shareBtn.disabled = true;
  const originalLabel = shareBtn.textContent;
  shareBtn.textContent = "画像を作成中…";

  // ファイル共有に対応する端末ではXへのタブは開かず navigator.share に任せる。
  // それ以外は画像生成(await)を挟むとユーザー操作の直後ではなくなり
  // ポップアップブロッカーに阻まれるため、クリック直後の同期処理内でタブだけ先に開いておく。
  const supportsFileShare = !!(navigator.canShare &&
    navigator.canShare({ files: [new File([""], "check.png", { type: "image/png" })] }));
  const twitterWindow = supportsFileShare ? null : window.open("", "_blank");

  let blob;
  try {
    blob = await buildShareImage(lastRanked);
  } catch (err) {
    if (twitterWindow) twitterWindow.close();
    alert("画像の生成に失敗しました。file:// で直接開いている場合、ローカルサーバー経由で開くと解決することがあります。");
    shareBtn.disabled = false;
    shareBtn.textContent = originalLabel;
    return;
  }

  const text = `私の好き顔No.1は${lastRanked[0].name}でした！\n#LAPONE好き顔診断`;
  const file = new File([blob], "lapone-favorite9.png", { type: "image/png" });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], text, url: SHARE_URL || undefined });
      shareBtn.disabled = false;
      shareBtn.textContent = originalLabel;
      return;
    } catch (err) {
      if (err && err.name === "AbortError") {
        shareBtn.disabled = false;
        shareBtn.textContent = originalLabel;
        return;
      }
    }
  }

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "lapone-favorite9.png";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 5000);

  const tweetParams = new URLSearchParams({ text });
  if (SHARE_URL) tweetParams.set("url", SHARE_URL);
  const tweetUrl = `https://twitter.com/intent/tweet?${tweetParams.toString()}`;
  if (twitterWindow) {
    twitterWindow.location.href = tweetUrl;
  } else {
    window.open(tweetUrl, "_blank");
  }
  alert("画像をダウンロードしました。Xの投稿画面に保存した画像を添付してください。");

  shareBtn.disabled = false;
  shareBtn.textContent = originalLabel;
}

// Group selection (multi-select, requires 2+ groups to start)
function updateSelectMeta() {
  const meta = document.getElementById("selectMeta");
  if (selectedGroups.size < 2) {
    meta.textContent = "";
    return;
  }
  const n = ALL_IDOLS.filter(x => selectedGroups.has(x.group)).length;
  const totalPairs = n * (n - 1) / 2;
  const total = compareMode === "full" ? totalPairs : Math.min(totalPairs, Math.ceil(n * 2.5));
  const minutes = Math.max(1, Math.round(total * 5 / 60));
  meta.textContent = `所要時間：約${minutes}分 ・ 全${total}対戦`;
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", function () {
    const g = this.dataset.group;
    if (selectedGroups.has(g)) {
      selectedGroups.delete(g);
      this.classList.remove("active");
    } else {
      selectedGroups.add(g);
      this.classList.add("active");
    }
    document.getElementById("startBtn").disabled = selectedGroups.size < 2;
    updateSelectMeta();
  });
});

// Mode selection (quick / full round-robin)
document.querySelectorAll(".mode-btn").forEach(btn => {
  btn.addEventListener("click", function () {
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    compareMode = this.dataset.mode;
    updateSelectMeta();
  });
});

document.getElementById("startBtn").addEventListener("click", () => {
  if (selectedGroups.size < 2) return;
  document.getElementById("selectScreen").classList.add("hidden");
  document.getElementById("battleScreen").classList.remove("hidden");
  initGame();
});
</script>
